# Unique map name to avoid collision with tube.sochispirit.com.conf
map $http_upgrade $ws_feelyoga_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name feelyoga-dev.vaibkod.online;

    access_log /var/log/nginx/feelyoga-dev.access.log;
    error_log /var/log/nginx/feelyoga-dev.error.log warn;

    # Видео-аплоад до 5GB
    client_max_body_size 5G;

    location / {
        proxy_pass http://feelyoga-nginx:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $ws_feelyoga_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Scheme https;
        proxy_read_timeout 5m;
        proxy_connect_timeout 1m;
        proxy_send_timeout 5m;
    }
}
