# vaibkod.online — HTML-моки FeelYoga для согласования с заказчиком
# Создано 2026-05-15. Когда моки больше не нужны — снести этот файл + volume.

server {
    listen 80;
    server_name vaibkod.online www.vaibkod.online;

    access_log /var/log/nginx/vaibkod.online.access.log;
    error_log /var/log/nginx/vaibkod.online.error.log warn;

    root /var/www/feelyoga-mockups;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Запретить читать другие домены через directory traversal
    location ~ /\. {
        deny all;
    }
}
